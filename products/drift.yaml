    verdict: true
    sources:
      - url: "https://drift.com/integrations"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_handoff
    name: "Live rep handoff"
    mechanism: "Routes qualified leads to available SDR with conversation context in the same chat window"
    jobs: [handoff-with-context]
    verdict: true
    sources:
      - url: "https://drift.com/features/live-chat"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_voice
    name: "Voice interaction"
    mechanism: "No voice feature; all interactions are text chat"
    jobs: [voice-first-interaction]
    verdict: false
    sources:
      - url: "https://drift.com/features"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_b2c
    name: "B2C / e-commerce support"
    mechanism: "B2B-only; no D2C or retail support"
