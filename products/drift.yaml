features:
  - id: drift_engage
    name: "Visitor engagement via Drift AI"
    mechanism: "Text chat bot engages visitors using playbooks; SDR takes over for qualified leads"
    jobs: [engage-visitor-without-rep]
    verdict: true
    notes: "Playbook-driven, not runtime-personalised"
    sources:
      - url: "https://drift.com/features"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_qualify
    name: "Bot-led qualification"
    mechanism: "Drift AI runs playbook-driven qualification via text chat to capture BANT signals"
    jobs: [qualify-visitor-autonomously]
    verdict: true
    sources:
      - url: "https://drift.com/features/qualification"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_booking
    name: "In-conversation meeting booking"
    mechanism: "Schedules meetings during chat via integrated calendar (Drift Meetings)"
    jobs: [book-meeting-in-session]
    verdict: true
    sources:
      - url: "https://drift.com/features/meetings"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_deanon
    name: "Account-level deanonymization"
    mechanism: "Identifies visiting company via IP enrichment through 6sense integration"
    jobs: [identify-company-on-site]
    verdict: true
    sources:
      - url: "https://drift.com/features"
        date: 2026-05-01
        type: vendor_docs

  - id: drift_crm
    name: "CRM sync"
    mechanism: "Syncs contact and conversation data to Salesforce, HubSpot, and Marketo"
